<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Statistics Cheat Sheet — Data Science</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Code+Pro:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#faf8f3;--paper:#f4f1e8;--ink:#1a1a2e;--ink2:#3d3d5c;--ink3:#888;
  --gold:#c9941a;--gold2:#f0c040;--indigo:#2d3a8c;--indigo2:#4a5bbf;
  --teal:#1a7a6e;--rose:#b5344a;--violet:#6b2fa0;--amber:#d4700a;
  --border:#ddd9cc;--border2:#c8c3b0;
  --s0:#c9941a;--s1:#2d3a8c;--s2:#1a7a6e;--s3:#b5344a;
  --s4:#6b2fa0;--s5:#d4700a;--s6:#1a5f7a;--s7:#5a7a1a;
}
body{background:var(--cream);color:var(--ink);font-family:'Lato',sans-serif;line-height:1.65;min-height:100vh;}
::selection{background:var(--gold2);color:var(--ink);}

/* ── HERO ── */
.hero{
  background:var(--ink);
  padding:4rem 2rem 3rem;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 80% 50%,rgba(45,58,140,0.35) 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%,rgba(201,148,26,0.2) 0%,transparent 70%);
}
.hero-inner{max-width:960px;margin:0 auto;position:relative;}
.hero-badge{
  display:inline-block;
  font-family:'Lato',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);border:1px solid rgba(201,148,26,0.5);
  padding:4px 14px;border-radius:20px;margin-bottom:1.25rem;
}
.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,5vw,3.8rem);
  font-weight:700;line-height:1.1;
  color:#fff;margin-bottom:.75rem;
}
.hero h1 em{color:var(--gold);font-style:italic;}
.hero-sub{font-size:15px;color:rgba(255,255,255,0.6);max-width:520px;line-height:1.7;}
.hero-meta{
  display:flex;gap:2.5rem;margin-top:2rem;flex-wrap:wrap;
  padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.1);
}
.hm{text-align:left;}
.hm-n{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);font-weight:400;}
.hm-l{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}

/* ── CONTROLS ── */
.ctrl{
  position:sticky;top:0;z-index:100;
  background:rgba(250,248,243,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:.85rem 2rem;
}
.ctrl-inner{max-width:960px;margin:0 auto;}
.search-wrap{position:relative;margin-bottom:.65rem;}
.search-wrap::before{
  content:'⌕';
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--ink3);font-size:17px;pointer-events:none;
}
#q{
  width:100%;padding:9px 16px 9px 38px;
  background:#fff;border:1.5px solid var(--border2);border-radius:10px;
  font-family:'Lato',sans-serif;font-size:14px;color:var(--ink);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
#q:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(45,58,140,0.1);}
#q::placeholder{color:var(--ink3);}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab-btn{
  padding:4px 13px;border-radius:20px;
  border:1.5px solid var(--border);
  font-size:12px;font-weight:700;letter-spacing:.3px;
  cursor:pointer;background:transparent;color:var(--ink3);
  font-family:'Lato',sans-serif;transition:all .15s;white-space:nowrap;
}
.tab-btn:hover{border-color:var(--border2);color:var(--ink2);}

/* ── MAIN CONTENT ── */
.main{max-width:960px;margin:0 auto;padding:2rem 2rem 4rem;}
.section{margin-bottom:3rem;}
.sec-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:1.25rem;padding-bottom:10px;
  border-bottom:2px solid var(--border);
  position:relative;
}
.sec-head::after{
  content:'';
  position:absolute;bottom:-2px;left:0;
  width:60px;height:2px;
  background:var(--cc,var(--gold));
  border-radius:2px;
}
.sec-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.sec-title{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:400;color:var(--ink);}
.sec-count{margin-left:auto;font-size:12px;color:var(--ink3);font-family:'Lato',sans-serif;font-weight:700;letter-spacing:1px;}

/* ── GRID & CARDS ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:12px;}
.card{
  background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:16px 17px;
  position:relative;overflow:hidden;
  transition:box-shadow .2s,border-color .2s,transform .15s;
  cursor:default;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--cc,var(--gold));
}
.card:hover{
  box-shadow:0 8px 32px rgba(26,26,46,0.1);
  border-color:var(--border2);
  transform:translateY(-2px);
}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.card-chip{
  font-family:'Lato',sans-serif;font-size:10px;font-weight:700;
  padding:2px 9px;border-radius:12px;letter-spacing:.5px;text-transform:uppercase;
}
.card-diff{
  margin-left:auto;font-size:11px;color:var(--ink3);
  font-family:'Lato',sans-serif;letter-spacing:.5px;
}
.card-title{
  font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
  color:var(--ink);margin-bottom:8px;line-height:1.3;
}
.formula-box{
  background:var(--paper);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;margin:8px 0;
  font-family:'Source Code Pro',monospace;font-size:11.5px;
  color:var(--ink2);line-height:1.65;white-space:pre;
  overflow-x:auto;
}
.card-body{font-size:13px;color:var(--ink2);line-height:1.65;margin-bottom:6px;}
.example{
  font-size:12px;color:var(--ink3);
  border-left:3px solid var(--border2);
  padding:5px 10px;margin:7px 0;
  font-style:italic;line-height:1.55;
  border-radius:0 5px 5px 0;
  background:var(--paper);
}
.insight{
  font-size:12px;padding:6px 10px;
  border-radius:7px;margin-top:7px;line-height:1.55;font-weight:400;
}
.ins-gold{background:rgba(201,148,26,0.1);border:1px solid rgba(201,148,26,0.25);color:#8a6200;}
.ins-blue{background:rgba(45,58,140,0.08);border:1px solid rgba(45,58,140,0.2);color:#2d3a8c;}
.ins-red{background:rgba(181,52,74,0.08);border:1px solid rgba(181,52,74,0.2);color:#8a1a2a;}
.ins-green{background:rgba(26,122,110,0.08);border:1px solid rgba(26,122,110,0.2);color:#1a5a50;}

/* Highlight on search */
mark{background:rgba(240,192,64,0.45);color:var(--ink);border-radius:2px;padding:0 1px;}

/* No results */
.no-results{text-align:center;padding:4rem 2rem;color:var(--ink3);}
.no-results .nr-icon{font-size:3rem;margin-bottom:1rem;opacity:.4;}
.no-results p{font-size:15px;}

/* ── FOOTER ── */
.footer{
  text-align:center;padding:2rem;
  font-size:12px;color:var(--ink3);
  border-top:1px solid var(--border);
  background:var(--paper);
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">Data Science Reference</div>
    <h1>Complete <em>Statistics</em><br>Cheat Sheet</h1>
    <p class="hero-sub">Every formula, theorem &amp; concept — paired with plain-English intuitions and real-world examples so they truly stick.</p>
    <div class="hero-meta">
      <div class="hm"><div class="hm-n" id="total">80</div><div class="hm-l">Concepts</div></div>
      <div class="hm"><div class="hm-n">8</div><div class="hm-l">Topics</div></div>
      <div class="hm"><div class="hm-n" id="showing">80</div><div class="hm-l">Showing</div></div>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="ctrl">
  <div class="ctrl-inner">
    <div class="search-wrap">
      <input type="text" id="q" placeholder="Search any formula, concept, or keyword…" oninput="render()">
    </div>
    <div class="tabs" id="tab-bar"></div>
  </div>
</div>

<!-- CONTENT -->
<div class="main" id="main-out"></div>

<div class="footer">
  Built for learning · 80+ statistical concepts · Search &amp; filter by topic
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────
const SECTIONS = [
  { id:0, title:'Descriptive Statistics',   icon:'📊', color:'#c9941a' },
  { id:1, title:'Probability Theory',       icon:'🎲', color:'#2d3a8c' },
  { id:2, title:'Probability Distributions',icon:'📈', color:'#1a7a6e' },
  { id:3, title:'Hypothesis Testing',       icon:'🔬', color:'#b5344a' },
  { id:4, title:'Regression & Correlation', icon:'📉', color:'#6b2fa0' },
  { id:5, title:'Bayesian Statistics',      icon:'🧠', color:'#d4700a' },
  { id:6, title:'Machine Learning Metrics', icon:'🤖', color:'#1a5f7a' },
  { id:7, title:'Time Series & Key Concepts',icon:'⏱', color:'#5a7a1a' },
];

// d: 1=beginner 2=intermediate 3=advanced
// it: g=gold b=blue r=red gr=green
const CARDS = [

/* ══ 0  DESCRIPTIVE ══════════════════════════════════════════ */
{s:0,d:1,
 title:'Population vs Sample',
 f:'Population → μ (mean), σ (std dev), N (size)\nSample     → x̄ (mean), s (std dev), n (size)',
 b:'Population = entire group you want to study. Sample = subset you actually measure. Greek letters (μ, σ) denote population parameters; Roman letters (x̄, s) denote sample statistics.',
 e:'All 1 billion Facebook users = population. A random survey of 10,000 users = sample.',
 p:'We estimate unknown population parameters from sample statistics.',it:'g'},

{s:0,d:1,
 title:'Arithmetic Mean',
 f:'Population:  μ = (Σ xᵢ) / N\nSample:      x̄ = (Σ xᵢ) / n',
 b:'Sum of all values divided by count. The "balance point" of a distribution. Sensitive to extreme values (outliers).',
 e:'Salaries: $40k, $45k, $50k, $5M (CEO). Mean ≈ $1.28M — wildly misleading.',
 p:'When data is skewed or has outliers, report median instead of mean.',it:'r'},

{s:0,d:1,
 title:'Median',
 f:'Sort values ascending. Take the middle.\nEven n:  median = (x[n/2] + x[n/2+1]) / 2',
 b:'The middle value — 50th percentile. Splits distribution into two equal halves. Robust to outliers.',
 e:'Median home price is used because a few mansions would inflate the mean dramatically.',
 p:'Right-skewed data: mean > median.  Left-skewed: mean < median.',it:'b'},

{s:0,d:1,
 title:'Mode',
 f:'Mode = value(s) appearing most frequently\n(no formula — count occurrences)',
 b:'Only measure of centre usable on categorical (nominal) data. A distribution can be unimodal, bimodal or multimodal.',
 e:'Most popular product SKU; peak hour for customer logins.',
 p:'Bimodal distributions often reveal two distinct sub-populations mixed together.',it:'g'},

{s:0,d:1,
 title:'Range & Interquartile Range (IQR)',
 f:'Range = max(x) − min(x)\nIQR   = Q3 − Q1\nOutlier fences:  Q1 − 1.5·IQR  and  Q3 + 1.5·IQR',
 b:'Range is simplest spread measure but very sensitive to one outlier. IQR covers the middle 50% of data — robust and used in box plots.',
 e:'Exam scores 30–95: range = 65. IQR might be 20, a much more stable spread measure.',
 p:'Values outside Tukey fences (1.5×IQR) are mild outliers; outside 3×IQR are extreme outliers.',it:'g'},

{s:0,d:1,
 title:'Variance',
 f:'Population:  σ² = Σ(xᵢ − μ)²  / N\nSample:      s² = Σ(xᵢ − x̄)² / (n−1)',
 b:'Average squared deviation from the mean. Squaring removes negatives and emphasises large deviations. Units are squared (e.g. cm²).',
 e:'Heights with σ² = 4 cm² → std dev = 2 cm — typical person is 2 cm from average.',
 p:"Dividing by (n−1) is Bessel's correction — makes s² an unbiased estimator of σ².",it:'b'},

{s:0,d:1,
 title:'Standard Deviation',
 f:'σ = √(variance)\n68%  of data within μ ± 1σ\n95%  of data within μ ± 2σ\n99.7% of data within μ ± 3σ',
 b:'Square root of variance — returns to original units. Measures typical distance from the mean.',
 e:'IQ scores: μ = 100, σ = 15 → 95% of people have IQ between 70 and 130.',
 p:'The 68-95-99.7 empirical rule applies only to normal distributions.',it:'g'},

{s:0,d:2,
 title:'Z-Score (Standardisation)',
 f:'z = (x − μ) / σ\nMeaning: number of std devs x\n         is from the mean',
 b:'Converts any measurement to a common scale (mean=0, std=1). Enables fair comparison across different variables.',
 e:'Score of 85 on exam (μ=70, σ=10): z = (85−70)/10 = 1.5 → 1.5 std devs above average.',
 p:'|z| > 3 is commonly used as an outlier threshold (captures 99.7% of normal data).',it:'g'},

{s:0,d:2,
 title:'Skewness',
 f:'γ₁ = E[(X − μ)³] / σ³\nγ₁ > 0 → right-skewed (tail right)\nγ₁ < 0 → left-skewed  (tail left)\nγ₁ = 0 → symmetric',
 b:'Third standardised moment. Measures asymmetry of the distribution about its mean.',
 e:'Income distribution: strongly right-skewed. Easy exam scores: left-skewed (most near 100).',
 p:'Right-skewed: mean > median > mode.   Left-skewed: mode > median > mean.',it:'b'},

{s:0,d:2,
 title:'Kurtosis',
 f:'Kurt = E[(X − μ)⁴] / σ⁴\nExcess kurtosis = Kurt − 3\nNormal dist → excess = 0',
 b:'Fourth moment. Measures tail "heaviness." Leptokurtic (excess > 0) = fatter tails = more extreme values than normal.',
 e:'Financial returns are leptokurtic — market crashes occur far more often than a normal distribution predicts.',
 p:'High excess kurtosis means more outliers: critical for risk modelling.',it:'r'},

{s:0,d:2,
 title:'Covariance',
 f:'Cov(X,Y) = Σ(xᵢ − x̄)(yᵢ − ȳ) / (n−1)\n> 0 → variables move together\n< 0 → variables move opposite',
 b:'Measures joint variability between two variables. Tells direction of relationship but magnitude is scale-dependent.',
 e:'Height and weight: positive covariance. Temperature and heating costs: negative covariance.',
 p:'Covariance is hard to interpret directly — divide by std devs to get Pearson correlation.',it:'r'},

{s:0,d:2,
 title:'Pearson Correlation',
 f:"r = Cov(X,Y) / (σ_X · σ_Y)\nr ∈ [−1, +1]\n|r|>0.7 strong · 0.3–0.7 moderate · <0.3 weak",
 b:'Measures strength and direction of a linear relationship. Dimensionless — not affected by scale or units.',
 e:'Study hours vs exam score: r ≈ 0.82 (strong positive linear relationship).',
 p:'Correlation ≠ causation. Also misses entirely non-linear relationships.',it:'r'},

{s:0,d:2,
 title:"Spearman's Rank Correlation",
 f:"ρ = 1 − 6·Σdᵢ² / n(n²−1)\ndᵢ = rank(xᵢ) − rank(yᵢ)",
 b:'Non-parametric. Measures monotonic relationships using ranks. Robust to outliers and non-normal data.',
 e:'Ranking of products by price vs ranking by customer rating.',
 p:'Use Spearman when data is ordinal, skewed, or contains heavy outliers.',it:'g'},

{s:0,d:2,
 title:'Percentiles & Quantiles',
 f:'P-th percentile: value below which\nP% of data falls.\nQ1=P25  Q2=P50  Q3=P75',
 b:'Divide the ordered data into equal-sized groups. Median = Q2 = 50th percentile. Quantiles generalise to any number of groups.',
 e:'90th percentile salary: you earn more than 90% of people in that role.',
 p:'Five-number summary: min, Q1, median, Q3, max — the basis of box plots.',it:'b'},

/* ══ 1  PROBABILITY ══════════════════════════════════════════ */
{s:1,d:1,
 title:'Probability Axioms (Kolmogorov)',
 f:'P(A) ≥ 0         for any event A\nP(S) = 1          sample space is certain\nP(A∪B) = P(A)+P(B) if A∩B = ∅',
 b:'Three axioms from which all probability theory is derived. Probability is a function mapping events to [0,1].',
 e:'Rolling a die: P(S) = P({1,2,3,4,5,6}) = 1.  P(even) = 3/6 = 0.5.',
 p:'Complement rule follows: P(Aᶜ) = 1 − P(A).',it:'g'},

{s:1,d:1,
 title:'Addition Rule',
 f:'General:          P(A∪B) = P(A)+P(B)−P(A∩B)\nMutually exclusive: P(A∪B) = P(A)+P(B)',
 b:'Probability of A or B (or both) occurring. Subtract the intersection to avoid double-counting.',
 e:'P(heart or face card) = 13/52 + 12/52 − 3/52 = 22/52 ≈ 0.42.',
 p:'Mutually exclusive → P(A∩B) = 0. Independent → P(A∩B) = P(A)·P(B).',it:'g'},

{s:1,d:1,
 title:'Conditional Probability',
 f:'P(A | B) = P(A ∩ B) / P(B)\nRead: "probability of A given B"',
 b:'Restricts the sample space to B. Probability of A occurring, knowing that B has already occurred.',
 e:'P(fever | flu) = P(fever AND flu) / P(flu) — far higher than P(fever) alone.',
 p:'P(A|B) ≠ P(B|A). Confusing them is called the Prosecutor\'s Fallacy.',it:'r'},

{s:1,d:1,
 title:'Statistical Independence',
 f:'P(A ∩ B) = P(A) · P(B)\n⟺  P(A | B) = P(A)\n⟺  P(B | A) = P(B)',
 b:'A and B are independent if knowing one gives zero information about the other.',
 e:'Two fair coin flips are independent. Draws from a deck without replacement are not.',
 p:'Mutually exclusive events with P(A),P(B)>0 are actually DEPENDENT — not independent.',it:'r'},

{s:1,d:2,
 title:"Bayes' Theorem",
 f:"P(A | B) = P(B | A) · P(A)  /  P(B)\n\nPosterior  ∝  Likelihood × Prior",
 b:'Updates prior belief with new evidence. P(A) = prior. P(B|A) = likelihood. P(A|B) = posterior.',
 e:'Spam filter: P(spam | "FREE") = P("FREE" | spam)·P(spam) / P("FREE").',
 p:'Always include the base rate P(A) — ignoring it causes the Base Rate Fallacy.',it:'r'},

{s:1,d:2,
 title:'Law of Total Probability',
 f:'P(B) = Σ P(B | Aᵢ) · P(Aᵢ)\nwhere A₁, A₂, … Aₙ partition S',
 b:'Calculates the marginal probability of B by summing over all mutually exclusive paths that lead to B.',
 e:'P(positive test) = P(pos|sick)·P(sick) + P(pos|healthy)·P(healthy).',
 p:'This gives you the denominator P(B) needed in Bayes\' Theorem.',it:'b'},

{s:1,d:1,
 title:'Expected Value',
 f:'E[X] = Σ xᵢ·P(xᵢ)         (discrete)\nE[X] = ∫ x·f(x) dx          (continuous)\nE[aX + b] = a·E[X] + b      (linearity)',
 b:'Probability-weighted average. The long-run average outcome across infinite repetitions.',
 e:'Fair die: E[X] = 1(1/6)+2(1/6)+…+6(1/6) = 3.5.',
 p:'E[X+Y] = E[X]+E[Y] always. E[XY] = E[X]·E[Y] only when X,Y are independent.',it:'g'},

{s:1,d:2,
 title:'Variance of a Random Variable',
 f:'Var(X) = E[X²] − (E[X])²\nVar(aX + b) = a²·Var(X)\nVar(X + Y) = Var(X)+Var(Y)+2·Cov(X,Y)',
 b:'Second central moment. Measures expected squared deviation from the mean.',
 e:'For independent X,Y: Var(X+Y) = Var(X)+Var(Y). Adding a constant b changes mean, not variance.',
 p:'Var(X+Y) = Var(X)+Var(Y) only when X and Y are independent.',it:'b'},

{s:1,d:2,
 title:'Central Limit Theorem (CLT)',
 f:'X̄ ~ N(μ, σ²/n)   as  n → ∞\nStandard Error = σ / √n\nRule of thumb: n ≥ 30',
 b:'The sample mean of ANY distribution (with finite variance) approaches a normal distribution as n grows. The most important theorem in statistics.',
 e:'Average of 100 dice rolls ≈ Normal(3.5, …) regardless of the die\'s distribution.',
 p:'CLT describes the SHAPE (normal). Law of Large Numbers describes WHERE it converges (μ).',it:'g'},

{s:1,d:2,
 title:'Law of Large Numbers',
 f:'Weak LLN:  X̄ → μ  in probability\nStrong LLN: X̄ → μ  almost surely\n(both as n → ∞)',
 b:'Sample mean converges to true population mean as sample size grows — regardless of distribution.',
 e:'Average of 1 million coin flips ≈ 0.500 reliably.',
 p:'LLN says where the distribution centres. CLT says what shape it takes.',it:'b'},

{s:1,d:2,
 title:'Counting: Permutations & Combinations',
 f:'Permutation (order matters):\n  P(n,k) = n! / (n−k)!\nCombination (order irrelevant):\n  C(n,k) = n! / [k!(n−k)!]',
 b:'Permutation: how many ways to arrange k items from n. Combination: how many ways to choose k from n (order does not matter).',
 e:'Poker hand: C(52,5) = 2,598,960 possible 5-card hands.',
 p:'If "choose 3 from 10 where order matters" → use P(10,3) = 720.',it:'g'},

/* ══ 2  DISTRIBUTIONS ════════════════════════════════════════ */
{s:2,d:1,
 title:'Bernoulli Distribution',
 f:'P(X=1) = p,  P(X=0) = 1−p\nE[X]   = p\nVar(X) = p(1−p)',
 b:'Single binary trial: success (1) or failure (0). The building block of the Binomial distribution.',
 e:'One email: opened (p=0.25) or not opened. One ad impression: clicked or not.',
 p:'Variance is maximised at p = 0.5 (maximum uncertainty about the outcome).',it:'b'},

{s:2,d:1,
 title:'Binomial Distribution',
 f:'P(X=k) = C(n,k)·pᵏ·(1−p)^(n−k)\nE[X]   = n·p\nVar(X) = n·p·(1−p)',
 b:'Count of successes in n independent Bernoulli trials. Requires fixed n, constant p, and binary outcomes.',
 e:'Number of heads in 10 coin flips. Number of conversions from 1,000 ad impressions.',
 p:'When n is large and p is small with n·p = λ fixed, Binomial ≈ Poisson.',it:'g'},

{s:2,d:1,
 title:'Poisson Distribution',
 f:'P(X=k) = λᵏ·e^−λ / k!\nE[X]   = λ\nVar(X) = λ',
 b:'Counts events in a fixed time/space interval at constant average rate λ. Events are rare and independent.',
 e:'Server requests per minute, customer arrivals per hour, typos per page.',
 p:'Mean = Variance is a signature of Poisson. Overdispersion (Var > Mean) → Negative Binomial.',it:'g'},

{s:2,d:2,
 title:'Geometric Distribution',
 f:'P(X=k) = (1−p)^(k−1) · p\nE[X]   = 1/p\nVar(X) = (1−p)/p²',
 b:'Number of trials until the first success. Memoryless: past failures give no information about future probability.',
 e:'Rolls of a fair die until the first 6 (p=1/6): E[X] = 6 rolls expected.',
 p:'The only discrete memoryless distribution (Exponential is the continuous version).',it:'b'},

{s:2,d:1,
 title:'Normal Distribution',
 f:'f(x) = exp(−(x−μ)²/2σ²) / (σ√2π)\nN(0,1) = Standard Normal\n68-95-99.7 Rule',
 b:'Bell-shaped, symmetric, defined entirely by μ and σ. Arises naturally from sums of many small random effects (CLT).',
 e:'Heights, measurement errors, IQ scores — many natural phenomena are approximately normal.',
 p:'Linear combinations of independent normals are always normal.',it:'g'},

{s:2,d:2,
 title:'t-Distribution',
 f:'t = (X̄ − μ) / (s/√n)  ~  t(df = n−1)\nHeavier tails than Normal.\nt → N(0,1) as df → ∞',
 b:'Used when σ is unknown and estimated by s. Heavier tails account for the extra uncertainty in small samples.',
 e:'Testing if avg delivery time = 3 days with only n=12 samples → use t-test.',
 p:'For n ≥ 30, t-distribution ≈ Normal. Always use t-test when σ is unknown.',it:'b'},

{s:2,d:2,
 title:'Chi-Squared Distribution',
 f:'χ²(k) = Z₁² + Z₂² + … + Zₖ²\nE[χ²]   = k     (degrees of freedom)\nVar[χ²] = 2k',
 b:'Sum of k squared standard normal random variables. Always positive and right-skewed.',
 e:'Used in the chi-squared test for independence and goodness-of-fit tests.',
 p:'Sample variance follows: (n−1)·s²/σ² ~ χ²(n−1).',it:'b'},

{s:2,d:2,
 title:'F-Distribution',
 f:'F = [χ²₁/d₁] / [χ²₂/d₂]\nRatio of two chi-squared variables\ndivided by their degrees of freedom',
 b:'Ratio of two independent scaled chi-squared variables. Always positive, right-skewed.',
 e:'Used in ANOVA (comparing multiple group variances) and overall regression F-tests.',
 p:'F = t² when comparing one regression coefficient in simple regression.',it:'b'},

{s:2,d:2,
 title:'Exponential Distribution',
 f:'f(x) = λ·e^(−λx)    for x ≥ 0\nE[X]   = 1/λ\nMemoryless: P(X>s+t|X>s) = P(X>t)',
 b:'Time between events in a Poisson process. Continuous counterpart of the Geometric distribution.',
 e:'Time between customer arrivals, time until a machine fails, time until a call arrives.',
 p:'Memoryless: having waited 10 min tells you nothing about how much longer you will wait.',it:'g'},

{s:2,d:2,
 title:'Uniform Distribution',
 f:'f(x) = 1/(b−a)   for x ∈ [a, b]\nE[X]   = (a+b)/2\nVar(X) = (b−a)²/12',
 b:'Every outcome in [a,b] is equally likely. Maximum entropy distribution for bounded support.',
 e:'Random number generation. Uninformative (flat) prior in Bayesian analysis.',
 p:'Any continuous distribution can be simulated by applying its inverse CDF to a Uniform(0,1) sample.',it:'b'},

{s:2,d:3,
 title:'Beta Distribution',
 f:'Beta(α, β)  defined on [0, 1]\nE[X]   = α / (α+β)\nVar(X) = αβ / [(α+β)²(α+β+1)]',
 b:'Flexible distribution on [0,1]. Conjugate prior for Bernoulli/Binomial. α−1 and β−1 act as pseudo-counts of successes and failures.',
 e:'Modelling click-through rate uncertainty; Bayesian A/B testing for conversion rates.',
 p:'Beta(1,1) = Uniform(0,1). As α,β grow large it approaches Normal.',it:'g'},

{s:2,d:2,
 title:'Log-Normal Distribution',
 f:'If ln(X) ~ N(μ, σ²), X is Log-normal.\nMedian = eᵘ\nMean   = e^(μ + σ²/2)  > Median',
 b:'Right-skewed, positive-valued. Arises when many independent factors MULTIPLY together (not add).',
 e:'Stock prices, income distributions, website session durations, file sizes.',
 p:'Log-transform achieves normality — then apply standard normal-based methods.',it:'b'},

/* ══ 3  HYPOTHESIS TESTING ═══════════════════════════════════ */
{s:3,d:1,
 title:'Hypothesis Testing Framework',
 f:'H₀: null hypothesis      (no effect / status quo)\nH₁: alternative hypothesis (effect exists)\nReject H₀ when p-value < α',
 b:'Start with a sceptical null. Compute a test statistic. Reject H₀ only if observed data would be very unlikely under H₀.',
 e:'"Drug has no effect on blood pressure" (H₀) vs "drug lowers it" (H₁).',
 p:'We never "accept" H₀. We can only "fail to reject" it (absence of evidence ≠ evidence of absence).',it:'g'},

{s:3,d:1,
 title:'p-value — Correct Definition',
 f:'p = P(data as extreme or more extreme | H₀ true)\n\nNOT: P(H₀ is true)\nNOT: probability you are wrong',
 b:'Measures how surprising your data is under the assumption that H₀ is true. Smaller p → data harder to explain by chance.',
 e:'p = 0.03: "If H₀ were true, there is a 3% chance of observing a result this extreme." NOT "97% chance H₀ is false."',
 p:'The most misunderstood concept in statistics. The p-value says nothing directly about the probability that H₀ is true.',it:'r'},

{s:3,d:1,
 title:'Type I & Type II Errors',
 f:'Type I  (α): Reject TRUE H₀  = false positive\nType II (β): Keep  FALSE H₀  = false negative\nPower = 1 − β',
 b:'Fundamental trade-off: making it harder to reject H₀ (lower α) increases Type II error rate (β).',
 e:'Medical: Type II (missing a real disease) is usually worse. Spam filter: Type I (blocking good email) is worse.',
 p:'Power analysis: set α and desired power (1−β ≥ 0.8), then compute the minimum n needed.',it:'g'},

{s:3,d:2,
 title:'One-Sample t-Test',
 f:'H₀:  μ = μ₀\nt  = (x̄ − μ₀) / (s / √n)\ndf = n − 1',
 b:'Tests whether a sample mean differs significantly from a hypothesised population mean μ₀.',
 e:'Is the average page-load time = 2 seconds? Is average daily active users = 10,000?',
 p:'For n ≥ 30, the z-test is acceptable even when σ is unknown (CLT makes t ≈ z).',it:'b'},

{s:3,d:2,
 title:'Two-Sample t-Test (Welch\'s)',
 f:"H₀: μ₁ = μ₂\nt  = (x̄₁ − x̄₂) / √(s₁²/n₁ + s₂²/n₂)",
 b:'Tests whether two independent groups have the same population mean. Welch\'s version handles unequal variances.',
 e:'Control group vs treatment group in a randomised experiment — the workhorse of A/B testing.',
 p:'When same subjects are in both conditions, use Paired t-test — it\'s more powerful.',it:'b'},

{s:3,d:2,
 title:'Paired t-Test',
 f:'dᵢ = x₁ᵢ − x₂ᵢ       (within-subject diff)\nt  = d̄ / (s_d / √n)\ndf = n − 1',
 b:'For matched pairs or repeated measures. Eliminates between-subject noise, yielding greater statistical power.',
 e:'Blood pressure measured before and after treatment on the same patients.',
 p:'Pairing removes individual differences; useful when subjects serve as their own control.',it:'g'},

{s:3,d:2,
 title:'Chi-Squared Test of Independence',
 f:'χ² = Σ (Oᵢ − Eᵢ)² / Eᵢ\nEᵢ = (row total × col total) / N\ndf = (rows − 1)(cols − 1)',
 b:'Tests whether two categorical variables are statistically independent using a contingency table.',
 e:'Is product preference independent of age group? Is churn independent of pricing plan?',
 p:'Requires expected count ≥ 5 per cell. Use Fisher\'s Exact Test for smaller samples.',it:'g'},

{s:3,d:3,
 title:'ANOVA — Analysis of Variance',
 f:'F = MS_between / MS_within\nMS_between = SS_b / (k−1)\nMS_within  = SS_w / (N−k)',
 b:'Tests equality of means across k ≥ 3 groups simultaneously. F > 1 means between-group variation dominates.',
 e:'Do average sales differ significantly across four regional teams?',
 p:'Significant F only tells you ≥ 1 mean differs. Use Tukey\'s HSD post-hoc to find which pairs.',it:'b'},

{s:3,d:2,
 title:'Confidence Interval (CI)',
 f:'CI = x̄  ±  t* · (s/√n)     [σ unknown]\nCI = x̄  ±  z* · (σ/√n)    [σ known]\n95% CI → z* = 1.96',
 b:'An interval constructed to contain the true parameter with stated confidence. Wider when n is small or variance is large.',
 e:'95% CI for avg session duration: [3.1 min, 3.9 min].',
 p:'"95% of such intervals contain μ" — NOT "there is a 95% chance μ is in this interval."',it:'r'},

{s:3,d:2,
 title:'Statistical Power',
 f:'Power = 1 − β\nIncreases with:\n  ↑ sample size n\n  ↑ effect size\n  ↑ significance level α\n  ↓ variance σ²',
 b:'Probability of correctly rejecting H₀ when H₁ is true. Typically require ≥ 80%.',
 e:'Power = 0.8: if a real effect exists, you will detect it 80% of the time.',
 p:'Always calculate required n via power analysis BEFORE running the experiment.',it:'g'},

{s:3,d:3,
 title:"Effect Size — Cohen's d",
 f:"d = (μ₁ − μ₂) / σ_pooled\nSmall:  |d| ≈ 0.2\nMedium: |d| ≈ 0.5\nLarge:  |d| ≈ 0.8",
 b:'Standardised measure of practical significance — independent of sample size. Tells you HOW BIG the difference is.',
 e:'d = 0.5: the two group means differ by half a standard deviation.',
 p:'With millions of users, trivially small effects become "statistically significant." Always report effect size.',it:'g'},

{s:3,d:3,
 title:'Multiple Testing Correction',
 f:'FWER = 1 − (1−α)^m     (m tests run)\nBonferroni: αᵢ = α / m\nBenjamini-Hochberg: controls FDR',
 b:'Running m tests at α each inflates the family-wise error rate. Must correct to keep overall false-positive rate at α.',
 e:'20 tests at α=0.05 → ~64% chance of ≥1 false positive. Bonferroni uses α = 0.05/20 = 0.0025.',
 p:'Benjamini-Hochberg (FDR control) is less conservative than Bonferroni — preferred in exploratory analysis.',it:'b'},

/* ══ 4  REGRESSION ════════════════════════════════════════════ */
{s:4,d:1,
 title:'Simple Linear Regression',
 f:'ŷ = β₀ + β₁·x\nβ₁ = Cov(X,Y)/Var(X) = r·(σ_Y/σ_X)\nβ₀ = ȳ − β₁·x̄',
 b:'Models a linear relationship between one predictor and one outcome. OLS minimises the sum of squared residuals.',
 e:'Predict salary from years of experience. Predict sales from monthly advertising spend.',
 p:'The regression line always passes through the point (x̄, ȳ).',it:'b'},

{s:4,d:2,
 title:'Multiple Linear Regression',
 f:'ŷ = β₀ + β₁x₁ + β₂x₂ + … + βₖxₖ\nMatrix form:  β = (XᵀX)⁻¹ Xᵀy',
 b:'Extends SLR to k predictors. Each βᵢ = partial effect of xᵢ on ŷ, holding all other predictors constant.',
 e:'Predict house price from square footage, bedrooms, and neighbourhood score.',
 p:'Coefficients represent marginal effects — compare only after standardising variables.',it:'b'},

{s:4,d:2,
 title:'OLS Assumptions — LINE',
 f:'L  Linearity        — y is linear in X\nI  Independence    — errors are independent\nN  Normality        — residuals ~ Normal\nE  Equal variance  — homoscedasticity',
 b:'Gauss-Markov theorem: if LINE holds, OLS is BLUE (Best Linear Unbiased Estimator).',
 e:'Check with: residuals-vs-fitted plot, QQ-plot, Durbin-Watson, Breusch-Pagan tests.',
 p:'Violations → transformations, robust standard errors, WLS, or a different model family.',it:'r'},

{s:4,d:2,
 title:'R² and Adjusted R²',
 f:'R²     = 1 − SS_res/SS_tot\nAdj R² = 1 − (1−R²)·(n−1)/(n−k−1)',
 b:'R² = proportion of outcome variance explained by the model. Adding any variable (even noise) increases R².',
 e:'R² = 0.85: model explains 85% of variance in y.',
 p:'Always use Adjusted R² to compare models with different numbers of predictors.',it:'g'},

{s:4,d:2,
 title:'Residuals & Diagnostic Plots',
 f:'Residual:  eᵢ = yᵢ − ŷᵢ\nE[eᵢ] = 0   (if model is correct)\nΣeᵢ  = 0   (always in OLS)',
 b:'Residuals should be random noise. Patterns signal model misspecification.',
 e:'Funnel-shaped residuals → heteroscedasticity. Curved pattern → add polynomial term.',
 p:'Always examine: residuals vs fitted, Scale-Location, QQ-plot, and Residuals vs Leverage.',it:'g'},

{s:4,d:2,
 title:'Multicollinearity & VIF',
 f:'VIF_j = 1 / (1 − R²_j)\nVIF > 5  → moderate concern\nVIF > 10 → severe multicollinearity',
 b:'High correlation between predictors inflates standard errors, making coefficients unstable and hard to interpret.',
 e:'Predicting house price using both total_area and num_rooms (highly correlated).',
 p:'Solutions: drop one predictor, apply PCA, or use Ridge regression to regularise.',it:'r'},

{s:4,d:2,
 title:'Logistic Regression',
 f:'logit(p) = log[p/(1−p)] = β₀ + β₁x\nP(y=1)  = 1 / (1 + e^−z)\nOdds ratio = e^βᵢ',
 b:'Models the probability of a binary outcome using the logit (log-odds) link function.',
 e:'P(churn | tenure, plan) → churn prediction. P(click | user features) → ad targeting.',
 p:'Coefficients = log-odds. Exponentiate (e^βᵢ) to get interpretable odds ratios.',it:'b'},

{s:4,d:3,
 title:'Regularisation — Ridge, Lasso, Elastic Net',
 f:'Ridge (L2): Loss + λ·Σwⱼ²      → shrinks all\nLasso (L1): Loss + λ·Σ|wⱼ|     → zeros some\nElastic net: α·L1 + (1−α)·L2  → best of both',
 b:'Adds a penalty to large coefficients, reducing overfitting. λ controls the strength of regularisation.',
 e:'Lasso automatically zeroes out irrelevant features — built-in feature selection.',
 p:'MAP with Gaussian prior ↔ Ridge. MAP with Laplace prior ↔ Lasso.',it:'g'},

/* ══ 5  BAYESIAN ═════════════════════════════════════════════ */
{s:5,d:2,
 title:'Bayesian vs Frequentist',
 f:'Frequentist: P(data | θ)  — θ is fixed unknown\nBayesian:   P(θ | data) — θ is a random variable\nPosterior  ∝  Likelihood × Prior',
 b:'Frequentist: probability is the long-run frequency of an event. Bayesian: probability represents degree of belief, updated by data.',
 e:'Bayesian CI: "95% probability that θ lies here." A frequentist CI cannot make that statement.',
 p:'With enough data, the posterior concentrates around the true value regardless of the prior.',it:'g'},

{s:5,d:2,
 title:'Prior, Likelihood & Posterior',
 f:'P(θ | data) = P(data | θ) · P(θ) / P(data)\nPrior:      initial belief about θ\nLikelihood: how well θ explains data\nPosterior:  updated belief after data',
 b:'Bayesian inference: start with a prior, observe data, multiply by likelihood, normalise to get posterior.',
 e:'Prior: 10% of emails are spam. After seeing word "FREE", update to posterior ~80% spam.',
 p:'A uniform (flat) prior → posterior ∝ likelihood → result is equivalent to MLE.',it:'b'},

{s:5,d:3,
 title:'Conjugate Priors',
 f:'Beta−Binomial:\n  Beta(α,β) + k successes, n−k fails\n  → Beta(α+k, β+n−k)\nGamma−Poisson:\n  Gamma(α,β) + observations\n  → Gamma(α+Σxᵢ, β+n)',
 b:'A conjugate prior keeps the posterior in the same distributional family — enabling closed-form analytical updates.',
 e:'CTR estimation: start with Beta(1,1), observe 30 clicks from 100 impressions → Beta(31, 71).',
 p:'α−1 and β−1 act as pseudo-counts of prior successes and failures respectively.',it:'g'},

{s:5,d:3,
 title:'MLE vs MAP Estimation',
 f:'MLE: θ̂ = argmax P(data | θ)\nMAP: θ̂ = argmax P(data | θ) · P(θ)',
 b:'MLE: maximises likelihood with no prior. MAP: includes prior belief — equivalent to regularised MLE.',
 e:'MAP with Gaussian prior on coefficients → Ridge regression. Laplace prior → Lasso.',
 p:'MLE can overfit small samples. MAP regularises by pulling estimates toward the prior.',it:'g'},

{s:5,d:3,
 title:'Bayesian Credible Interval',
 f:'P(a ≤ θ ≤ b | data) = 0.95\nHighest Posterior Density (HPD) region',
 b:'Direct probability statement about the parameter — the interval most practitioners actually want.',
 e:'"95% probability that the true conversion rate is between 2.1% and 4.3%."',
 p:'Unlike a frequentist CI, a Bayesian credible interval is a direct probability statement about θ.',it:'b'},

/* ══ 6  ML METRICS ═══════════════════════════════════════════ */
{s:6,d:1,
 title:'Confusion Matrix',
 f:'              Predicted\n              Pos    Neg\nActual  Pos    TP     FN\n        Neg    FP     TN',
 b:'All classification metrics derive from these four counts. Understanding TP/FP/TN/FN is fundamental.',
 e:'Medical: TP = correct disease, FP = false alarm, FN = missed case, TN = correctly healthy.',
 p:'With class imbalance, accuracy is misleading — rely on Precision, Recall, F1, or AUC.',it:'r'},

{s:6,d:1,
 title:'Accuracy, Precision, Recall & F1',
 f:'Accuracy  = (TP+TN) / (TP+FP+TN+FN)\nPrecision = TP / (TP+FP)\nRecall    = TP / (TP+FN)\nF1 = 2·Precision·Recall / (Precision+Recall)',
 b:'Precision: of predicted positives, how many are real? Recall: of real positives, how many were found?',
 e:'Fraud: maximise Recall (catch all fraud). Spam filter: maximise Precision (no false alarms on good mail).',
 p:'F1 is the harmonic mean — it severely punishes a large gap between Precision and Recall.',it:'g'},

{s:6,d:2,
 title:'ROC Curve & AUC',
 f:'ROC: plot TPR vs FPR at all thresholds\nAUC = P(score_positive > score_negative)\nRandom classifier: AUC = 0.5\nPerfect classifier:  AUC = 1.0',
 b:'Threshold-independent evaluation metric. AUC = probability that the model ranks a random positive above a random negative.',
 e:'AUC = 0.92: model correctly ranks a true fraud case above a non-fraud 92% of the time.',
 p:'AUC is robust to class imbalance. For very rare positives, prefer Precision-Recall AUC.',it:'g'},

{s:6,d:1,
 title:'Regression Error Metrics',
 f:'MSE  = Σ(yᵢ − ŷᵢ)²  / n\nRMSE = √MSE\nMAE  = Σ|yᵢ − ŷᵢ| / n\nMAPE = Σ|eᵢ/yᵢ|   / n × 100%',
 b:'MSE/RMSE heavily penalise large errors (quadratic). MAE treats all errors equally. MAPE is percentage-based.',
 e:'RMSE = $200 → typical prediction error is $200. If RMSE >> MAE, a few huge errors dominate.',
 p:'Use MAE when robustness to outliers matters. Use MSE/RMSE when large errors are especially costly.',it:'b'},

{s:6,d:2,
 title:'Bias-Variance Tradeoff',
 f:'Expected MSE = Bias² + Variance + σ²\nBias²:    error from wrong model assumptions\nVariance: sensitivity to the training data\nσ²:       irreducible noise in the problem',
 b:'Simpler models → high bias (underfitting). Complex models → high variance (overfitting). Must balance both.',
 e:'Linear model for curved data: high bias. 10-degree polynomial on 20 samples: high variance.',
 p:'Regularisation, ensemble methods, and cross-validation help navigate this tradeoff.',it:'g'},

{s:6,d:2,
 title:'Cross-Validation',
 f:'k-fold: split data into k folds.\n  Train on k−1, test on 1. Rotate.\n  Report mean ± std of k scores.\nLOOCV: k = n (leave-one-out)',
 b:'Estimates how well a model generalises to unseen data using repeated train/test splits on the same dataset.',
 e:'5-fold CV: 80% training, 20% testing, repeated 5 times → average test score.',
 p:'Use Stratified k-fold for imbalanced classification problems.',it:'g'},

{s:6,d:3,
 title:'Log Loss (Cross-Entropy)',
 f:'LogLoss = −(1/n)·Σ[yᵢ·log(ŷᵢ) + (1−yᵢ)·log(1−ŷᵢ)]\nPerfect: 0    Random: ln(2) ≈ 0.693',
 b:'Penalises confident wrong predictions exponentially. Preferred metric for probabilistic classifiers.',
 e:'Predicting 0.99 for a true negative incurs a massive penalty vs predicting 0.55.',
 p:'Minimising log loss = maximising log-likelihood = training a well-calibrated probabilistic model.',it:'b'},

{s:6,d:3,
 title:'Model Calibration & Brier Score',
 f:'Well-calibrated:\n  predicted p ≈ actual empirical frequency\nBrier Score = Σ(pᵢ − yᵢ)² / n  (lower=better)',
 b:'A model is calibrated if predicted 70% probability corresponds to ~70% actual frequency of the event.',
 e:'Weather forecast: "70% chance of rain" should produce rain on 70% of those days.',
 p:'Diagnose with Reliability (Calibration) diagrams. Fix with Platt scaling or isotonic regression.',it:'g'},

/* ══ 7  EXTRAS ════════════════════════════════════════════════ */
{s:7,d:2,
 title:'Stationarity (Time Series)',
 f:'Weak (Covariance) Stationarity:\n  E[Xₜ] = μ              (constant mean)\n  Cov(Xₜ,Xₜ₊ₛ) = f(s)  (lag-only dependent)',
 b:'Statistical properties of the series do not change over time. Most classical time series models require stationarity.',
 e:'Stock prices: non-stationary (has a trend). Daily stock returns: approximately stationary.',
 p:'Test with the Augmented Dickey-Fuller (ADF) test. Apply differencing (ΔXₜ = Xₜ − Xₜ₋₁) to achieve it.',it:'g'},

{s:7,d:2,
 title:'Autocorrelation (ACF & PACF)',
 f:'ACF(k)  = Corr(Xₜ, Xₜ₋ₖ)\nPACF(k) = Corr(Xₜ, Xₜ₋ₖ | Xₜ₋₁,…,Xₜ₋ₖ₊₁)',
 b:'ACF measures correlation of series with its own past. PACF removes influence of all shorter lags — shows direct relationship.',
 e:'ACF cuts off after lag q → MA(q) model. PACF cuts off after lag p → AR(p) model.',
 p:'ARIMA(p,d,q): p = AR order (from PACF), d = differencing, q = MA order (from ACF).',it:'b'},

{s:7,d:2,
 title:"Simpson's Paradox",
 f:'Trend in each sub-group:\n  Treatment A > Treatment B\nCombined data:\n  Treatment B > Treatment A  ← reversal!',
 b:'Aggregating sub-groups can reverse an observed trend due to a lurking confounding variable.',
 e:'UC Berkeley admissions: women admitted at higher rate in most departments but lower rate overall.',
 p:'Always stratify and inspect sub-group trends before reporting aggregate statistics.',it:'r'},

{s:7,d:2,
 title:'Survivorship Bias',
 f:'Observed data ≠ True population\n(failures/dropouts are missing)\nEstimates from survivors → optimistic bias',
 b:'Analysing only "surviving" cases leads to systematically overoptimistic conclusions about performance.',
 e:'WWII: analysing bullet holes on returned aircraft misses where DESTROYED planes were hit.',
 p:'In ML: training only on currently active users means the model never sees churned users — it is biased.',it:'r'},

{s:7,d:1,
 title:"Anscombe's Quartet",
 f:"4 datasets with IDENTICAL summary stats:\n  Mean(x), Mean(y), Var(x), Var(y), r,\n  Regression line, R²\n... but completely different shapes.",
 b:'A classic demonstration that summary statistics can be deeply misleading — always visualise data before modelling.',
 e:'One linear, one curved, one outlier-driven, one vertical cluster — all produce identical statistics.',
 p:'Plot first, model second. Always.',it:'r'},

{s:7,d:2,
 title:'Bootstrapping',
 f:'Repeat B times:\n  1. Resample n points WITH replacement\n  2. Compute statistic θ̂*\n95% CI: [2.5th percentile, 97.5th percentile]',
 b:'Non-parametric method to estimate the sampling distribution of ANY statistic — no distributional assumptions needed.',
 e:'Confidence interval for the median (no closed-form formula). CI for model AUC.',
 p:'Requires i.i.d. data. Fails if the original sample is not representative of the population.',it:'g'},

{s:7,d:3,
 title:'Causal Inference Basics',
 f:'ATE = E[Y(1) − Y(0)]\nConfounder: variable that causes\n  BOTH the treatment X AND outcome Y\nCorrelation ≠ Causation',
 b:'Causal claims require more than correlation. Observational data has confounders; randomised experiments remove them.',
 e:'Ice cream sales correlate with drowning rates — both driven by hot weather (confounding).',
 p:'Tools: RCTs, Instrumental Variables, Diff-in-Diff, Regression Discontinuity, Propensity Score Matching.',it:'r'},

{s:7,d:3,
 title:'Information Theory Basics',
 f:'Entropy:       H(X) = −Σ p(x)·log₂ p(x)\nCross-entropy: H(p,q) = −Σ p(x)·log q(x)\nKL divergence: KL(p‖q) = Σ p·log(p/q)',
 b:'Entropy measures average uncertainty. Cross-entropy measures "cost" of using q to encode p. KL divergence measures how q differs from p.',
 e:'Fair coin entropy = 1 bit (maximum uncertainty). Biased coin (p=0.9): H ≈ 0.47 bits.',
 p:'Cross-entropy loss = entropy of truth + KL divergence from model to truth. Minimise it to improve calibration.',it:'b'},

{s:7,d:2,
 title:'A/B Testing End-to-End',
 f:'1. Set H₀: μ_A = μ_B  and α, power\n2. Compute min sample size n\n3. Randomise users to A and B\n4. Run test for full duration\n5. Compute p-value and effect size',
 b:'A rigorous A/B test requires pre-registration of hypotheses, full runtime (no peeking), and correction for multiple metrics.',
 e:'Testing a new checkout button: assign users randomly, run for 2 weeks, compare conversion rates.',
 p:'Peeking and stopping early inflates Type I error. Use Sequential Testing (e.g., always-valid p-values) if you must peek.',it:'g'},

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlight(str, q) {
  if (!q) return esc(str);
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(str).replace(new RegExp('(' + safe + ')', 'gi'), '<mark>$1</mark>');
}

function diffLabel(d) {
  return ['','◉ Beginner','◉◉ Intermediate','◉◉◉ Advanced'][d] || '';
}

function insClass(it) {
  return {g:'ins-gold', b:'ins-blue', r:'ins-red', gr:'ins-green'}[it] || 'ins-gold';
}

function render() {
  const q = (document.getElementById('q').value || '').trim().toLowerCase();
  const out = document.getElementById('main-out');

  const filtered = CARDS.filter(c => {
    if (activeTab !== -1 && c.s !== activeTab) return false;
    if (!q) return true;
    return (c.title + c.f + c.b + (c.e||'') + (c.p||'')).toLowerCase().includes(q);
  });

  document.getElementById('showing').textContent = filtered.length;

  if (!filtered.length) {
    out.innerHTML = `<div class="no-results">
      <div class="nr-icon">🔍</div>
      <p>No concepts match <strong>"${esc(q)}"</strong> — try a different search term.</p>
    </div>`;
    return;
  }

  const bySec = SECTIONS.map(sec => ({
    ...sec,
    cards: filtered.filter(c => c.s === sec.id)
  })).filter(sec => sec.cards.length > 0);

  let html = '';
  bySec.forEach(sec => {
    const col = sec.color;
    html += `
    <div class="section">
      <div class="sec-head" style="--cc:${col}">
        <div class="sec-icon" style="background:${col}18;color:${col}">${sec.icon}</div>
        <div class="sec-title">${sec.title}</div>
        <div class="sec-count">${sec.cards.length} concept${sec.cards.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="grid">`;

    sec.cards.forEach(c => {
      html += `
        <div class="card" style="--cc:${col}">
          <div class="card-top">
            <span class="card-chip" style="background:${col}18;color:${col};border:1px solid ${col}30">${SECTIONS[c.s].title.split(' ')[0]}</span>
            <span class="card-diff">${diffLabel(c.d)}</span>
          </div>
          <div class="card-title">${highlight(c.title, q)}</div>
          <div class="formula-box">${highlight(c.f, q)}</div>
          <div class="card-body">${highlight(c.b, q)}</div>
          ${c.e ? `<div class="example"><strong>Example:</strong> ${highlight(c.e, q)}</div>` : ''}
          <div class="insight ${insClass(c.it)}">💡 ${highlight(c.p, q)}</div>
        </div>`;
    });

    html += `</div></div>`;
  });

  out.innerHTML = html;
}

// ─── TABS ────────────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tab-bar');

  const allBtn = document.createElement('button');
  allBtn.className = 'tab-btn';
  allBtn.textContent = 'All topics';
  allBtn.style.cssText = `background:${SECTIONS[0].color};border-color:${SECTIONS[0].color};color:#fff;font-weight:700;`;
  allBtn.onclick = () => {
    activeTab = -1;
    document.querySelectorAll('.tab-btn').forEach(b => b.style.cssText = '');
    allBtn.style.cssText = `background:var(--ink);border-color:var(--ink);color:#fff;font-weight:700;`;
    render();
  };
  bar.appendChild(allBtn);

  SECTIONS.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = sec.title;
    btn.onclick = () => {
      activeTab = i;
      document.querySelectorAll('.tab-btn').forEach(b => b.style.cssText = '');
      btn.style.cssText = `background:${sec.color};border-color:${sec.color};color:#fff;font-weight:700;`;
      render();
    };
    bar.appendChild(btn);
  });

  // activate "All" on load
  allBtn.style.cssText = `background:var(--ink);border-color:var(--ink);color:#fff;font-weight:700;`;
}

// ─── INIT ────────────────────────────────────────────────────
document.getElementById('total').textContent = CARDS.length;
document.getElementById('showing').textContent = CARDS.length;
buildTabs();
render();
</script>
</body>
</html>
